name: Release

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to build and publish, for example v1.2.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.tag || github.event.release.tag_name || github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.10"
          enable-cache: true

      - name: Build source distribution and wheel
        run: uv build

      - name: Publish artifacts to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag || github.event.release.tag_name || github.ref_name }}
        run: |
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --generate-notes
          fi
          gh release upload "$RELEASE_TAG" dist/*.whl dist/*.tar.gz --clobber
