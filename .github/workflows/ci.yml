name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.10"
          enable-cache: true

      - name: Install PDF rendering dependency
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Sync environment
        run: make sync

      - name: Run repo checks
        run: make check

      - name: Run test suite
        run: make test

      - name: Build release artifacts
        run: make build

      - name: Smoke test uv tool install from wheel
        run: |
          uv tool install --force ./dist/*.whl
          mistralcli --version
          mistralcli --print-defaults
